name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Run tests
        run: npm test

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install osv-scanner
        run: |
          curl -sSfL https://raw.githubusercontent.com/google/osv-scanner/main/install_from_github_releases.sh | sh -s -- -b /usr/local/bin

      - name: Scan for vulnerabilities
        run: osv-scanner --lockfile=package-lock.json
